name: Weekly Design News

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 09:00 UTC = 06:00 BRT
  workflow_dispatch:        # manual trigger for testing

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}

      - name: Commit updated data + site
        run: |
          git config user.name "Design Bot"
          git config user.email "bot@designteam.com.br"
          git add data/ site/src/data/ outputs/
          git commit -m "chore: weekly edition $(date +%Y-%m-%d)" || exit 0
          git push
